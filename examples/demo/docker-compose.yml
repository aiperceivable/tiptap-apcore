services:
  frontend:
    build:
      context: ../..
      dockerfile: examples/demo/Dockerfile.frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/demo/frontend/src
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8000

  backend:
    build:
      context: ../..
      dockerfile: examples/demo/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PORT=8000
    # Endpoints:
    #   POST /api/chat       — AI chat (Vercel AI SDK)
    #   GET  /api/health     — Health check
    #   GET  /api/mcp-status — MCP server status + tool count
    #   ALL  /mcp            — MCP streamable-http endpoint
    #   GET  /explorer       — MCP Tool Explorer UI
